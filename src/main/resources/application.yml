spring:
    datasource:
        url: jdbc:mysql://localhost:3306/flight-api
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

logging:
    level:
        org:
            hibernate:
                SQL: DEBUG

# JWT Configuration
jwt:
    secret-key: ThisIsAStrongSecretKey1234567890abcdefghijklmnopqrstuvwxyz
    # 24 hours in milliseconds
    expiration: 86400000
# 应用名称
spring.application.name=flight-api

# 应用运行的端口号，默认为 8081，可根据需要修改
server.port=8081

# 数据库连接地址，格式为 jdbc:mysql://<主机>:<端口>/<数据库名>
spring.datasource.url=jdbc:mysql://localhost:3306/flightsbooking
# spring.datasource.url=jdbc:mysql://wk-flightdb.cj6gcogsidzt.ap-southeast-2.rds.amazonaws.com:3306/flight_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true

# 数据库用户名，用于认证连接数据库
spring.datasource.username=root
# spring.datasource.username=admin

# 数据库密码，用于认证连接数据库
spring.datasource.password=123456
# spring.datasource.password=12345678


# 数据库驱动程序类名，MySQL 使用 com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 是否格式化 SQL 输出，便于调试和查看生成的 SQL 语句
spring.jpa.properties.hibernate.format_sql=true

# Hibernate 自动管理数据库表结构的策略：
# none: 不进行任何操作
# validate: 验证表结构是否匹配，不修改数据库
# update: 更新表结构以匹配实体类
# create: 每次运行重新创建表
# create-drop: 程序结束时删除表
spring.jpa.hibernate.ddl-auto=update

# 初始化数据脚本
spring.sql.init.mode=always
#spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# 是否显示 Hibernate 生成的 SQL 语句，便于调试和优化查询
spring.jpa.show-sql=true

# 指定日志文件（放在项目根目录）
logging.file.name=app.log

# 指定日志文件目录（放在 logs 文件夹）
logging.file.path=logs

# 设置日志格式（可选）
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %level - %msg%n

# JWT密钥
jwt.secret=your-secret-key-256bits-1234567890ABCD

# 10mins
jwt.jwtExpirationMs=36000000

# 10mins
jwt.refreshExpiration=36000000

# 10%的税率
app.tax-rate=0.10  